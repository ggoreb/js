<body>
  <script>
    // Business Logic
    function quiz(answer, fnPrint) {
      if(answer) fnPrint('Yes!!');
      else       fnPrint('No!!');
    }

    function callback(result) {
      console.log(result);
    }

    quiz(true, callback);
 
    function 내꺼(결과) {
      console.log(결과);
    }
    quiz(false, 내꺼);

    quiz(false, function(res) {
      console.log(res);
    });
  </script>
</body>
